<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../dist/output.css" rel="stylesheet" />
  </head>

  <body class="bg-slate-900 text-slate-100 text-center sm:text-left">
    <header
      class="bg-slate-200 text-slate-800 flex flex-col sm:flex-row items-center p-4 gap-4"
    >
      <h1 class="text-xl font-bold">Landing pagina</h1>

      <nav class="flex gap-3 sm:ml-auto">
        <button class="bg-black text-white px-4 py-2 rounded">
          Registreren
        </button>

        <button class="border px-4 py-2 rounded">Inloggen</button>
      </nav>
    </header>

    <main class="mt-10 px-6 sm:px-10 lg:px-16">
      <section
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 justify-items-center"
      >
        <article
          class="flex flex-col items-center gap-3 hover:scale-110 transition"
        >
          <figure class="w-48">
            <img
              src="../assets/images/spotify.png"
              alt="MusicMatch"
              class="w-32 h-32 sm:w-36 sm:h-36 object-contain mx-auto rounded-full"
            />

            <figcaption class="mt-3 text-lg text-center">MusicMatch</figcaption>
          </figure>

          <a href="./unavailable.html" class="text-sm hover:underline">
            Meer zien >
          </a>
        </article>

        <article
          class="flex flex-col items-center gap-3 hover:scale-110 transition"
        >
          <figure class="w-48">
            <img
              src="../assets/images/gamehub.png"
              alt="GameHub"
              class="w-32 h-32 sm:w-36 sm:h-36 object-contain mx-auto rounded-full"
            />

            <figcaption class="mt-3 text-lg text-center">GameHub</figcaption>
          </figure>

          <a href="./index.html" class="text-sm hover:underline">
            Meer zien >
          </a>
        </article>

        <article
          class="flex flex-col items-center gap-3 hover:scale-110 transition"
        >
          <figure class="w-48">
            <img
              src="../assets/images/lego.png"
              alt="LegoMaster"
              class="w-32 h-32 sm:w-36 sm:h-36 object-contain mx-auto rounded-full"
            />

            <figcaption class="mt-3 text-lg text-center">LegoMaster</figcaption>
          </figure>

          <a href="./unavailable.html" class="text-sm hover:underline">
            Meer zien >
          </a>
        </article>
      </section>
    </main>
  </body>
</html>
