<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>Registreren</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../dist/output.css" rel="stylesheet" />
    <script src="../scripts/login/login.js" defer></script>
  </head>

  <body class="bg-slate-900 text-slate-100 text-center sm:text-left">
    <!-- HEADER -->
    <header
      class="bg-slate-200 text-slate-800 flex flex-col sm:flex-row items-center p-4 gap-4"
    >
      <h1 class="text-xl font-bold">Registeren</h1>

      <nav class="flex gap-3 sm:ml-auto">
        <a href="../index.html" class="border px-4 py-2 rounded">Home</a>
        <a
          href="./register.html"
          class="bg-black text-white border px-4 py-2 rounded"
        >
          Registreren
        </a>

        <a href="./login.html" class="border px-4 py-2 rounded">Inloggen</a>
      </nav>
    </header>

    <!-- LOGIN FORM -->
    <main class="flex justify-center items-center mt-16 px-6">
      <section class="bg-slate-800 p-8 rounded-2xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center">Registreer</h2>

        <form class="flex flex-col gap-4">
          <!-- EMAIL -->
          <div class="flex flex-col text-left">
            <label for="email" class="mb-1">Email</label>
            <input
              type="email"
              id="email"
              placeholder="voorbeeld@mail.com"
              class="p-2 rounded bg-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <!-- PASSWORD -->
          <div class="flex flex-col text-left">
            <label for="password" class="mb-1">Wachtwoord</label>
            <input
              type="password"
              id="password"
              placeholder="********"
              class="p-2 rounded bg-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <!-- BUTTON -->
          <button
            type="submit"
            class="mt-4 bg-blue-600 hover:bg-blue-700 transition px-4 py-2 rounded font-semibold"
          >
            Registreren
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
